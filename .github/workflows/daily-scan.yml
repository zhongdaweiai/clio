name: Daily Polymarket Paper Trade Scan

on:
  schedule:
    # 14:00 UTC = 7 AM PT / 10 AM ET — markets are typically priced by then
    - cron: '0 14 * * *'
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: write  # needs to commit paper_trades/

concurrency:
  group: paper-trade
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install anthropic

      - name: Run paper-trade scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          python scripts/paper_trade_scan.py

      - name: Commit signals
        run: |
          git config user.name "clio-bot"
          git config user.email "actions@github.com"
          git add paper_trades/
          if ! git diff --cached --quiet; then
            today=$(date -u +%Y-%m-%d)
            git commit -m "paper trade scan: $today (auto)"
            git push
          else
            echo "no changes to commit"
          fi

      - name: Send email summary
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python scripts/notify.py scan

      - name: Send high-edge alert (if any |edge| >= 0.30)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python scripts/notify.py high_edge
