name: Weekly Resolution Check + PnL Update

on:
  schedule:
    # Every day at 16:00 UTC — small, fast, idempotent. Better daily so the
    # SUMMARY.md is fresh, not just weekly.
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: resolution-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install minimal deps
        run: pip install -e ".[dev]"

      - name: Check resolutions and update PnL
        run: python scripts/paper_trade_check.py

      - name: Commit PnL update
        run: |
          git config user.name "clio-bot"
          git config user.email "actions@github.com"
          git add paper_trades/
          if ! git diff --cached --quiet; then
            today=$(date -u +%Y-%m-%d)
            git commit -m "resolution check + PnL update: $today

Auto-generated by .github/workflows/resolution-check.yml"
            git push
          else
            echo "no resolution updates"
          fi
